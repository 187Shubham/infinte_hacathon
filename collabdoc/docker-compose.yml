version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: collabdoc-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: collabdoc-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/collabdoc
      - JWT_SECRET=your_super_secret_jwt_key_change_in_production
      - CLIENT_URL=http://localhost:3000
    depends_on:
      - mongodb
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build: ./frontend
    container_name: collabdoc-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SERVER_URL=http://localhost:5000
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongo_data:
